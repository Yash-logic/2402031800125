<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinWise | Advanced Finance Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block bg-white sidebar shadow-sm vh-100 position-fixed">
            <div class="p-4">
                <h3 class="text-primary fw-bold">FinWise</h3>
                <ul class="nav flex-column mt-5">
                    <li class="nav-item mb-3"><a href="#" class="nav-link active"><i class="bi bi-grid-1x2-fill me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-3"><a href="#" class="nav-link text-dark"><i class="bi bi-bar-chart-fill me-2"></i> Analysis</a></li>
                    <li class="nav-item mb-3"><a href="#" class="nav-link text-dark"><i class="bi bi-wallet2 me-2"></i> Budgets</a></li>
                    <li class="nav-item mb-3"><a href="#" class="nav-link text-dark"><i class="bi bi-person-circle me-2"></i> Profile</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold">Financial Overview</h4>
                <div class="d-flex align-items-center">
                    <button id="themeToggle" class="btn btn-outline-secondary me-3"><i class="bi bi-moon-stars"></i></button>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTransactionModal">+ New Transaction</button>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3">
                        <small class="text-muted">Total Balance</small>
                        <h3 class="fw-bold text-dark">$42,500.00</h3>
                        <span class="text-success small"><i class="bi bi-arrow-up"></i> 12% vs last month</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card border-0 shadow-sm p-3">
                        <small class="text-muted">Monthly Expenses</small>
                        <h3 class="fw-bold text-danger">$12,400.00</h3>
                        <span class="text-danger small"><i class="bi bi-arrow-up"></i> 5% vs last month</span>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm p-3">
                        <canvas id="miniTrendChart" height="60"></canvas>
                    </div>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-8">
                    <div class="card border-0 shadow-sm p-4">
                        <h6 class="fw-bold mb-3">Weekly Financial Insights</h6>
                        <canvas id="mainAnalysisChart"></canvas>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm p-4 h-100">
                        <h6 class="fw-bold mb-3">Category Breakdown</h6>
                        <canvas id="categoryPieChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6 class="fw-bold mb-3">Recent Transactions</h6>
                    <div class="table-responsive">
                        <table class="table align-middle" id="txnTable">
                            <thead class="table-light">
                                <tr>
                                    <th>Service</th>
                                    <th>Category</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>
</body>
</html>
